name: Deploy to GitHub Pages (Quartz)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Quartz can surface accurate last-modified dates

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: git clone https://github.com/jackyzha0/quartz.git --depth 1

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('quartz/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: quartz/.quartz/plugins
          key: ${{ runner.os }}-qplugins-${{ hashFiles('quartz/quartz.lock.json') }}
          restore-keys: ${{ runner.os }}-qplugins-

      - name: Install npm dependencies
        working-directory: quartz
        run: npm ci

      - name: Copy content and config
        run: |
          # Synthesis layer (main wiki)
          cp -r wiki/. quartz/content/
          # Raw sources so [[wikilinks]] to source slugs resolve in the rendered site
          mkdir -p quartz/content/raw
          cp -r raw/. quartz/content/raw/
          # Site-specific Quartz config (overrides the Quartz default)
          cp quartz.config.yaml quartz/quartz.config.yaml

      - name: Install Quartz plugins
        working-directory: quartz
        run: npx quartz plugin install

      - name: Build
        working-directory: quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
